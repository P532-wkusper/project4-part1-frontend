<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Plans</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:0;padding:0}
    header{background:#264653;color:#fff;padding:12px}
    main{padding:16px}
    .card{border:1px solid #ddd;padding:12px;margin:8px 0;border-radius:6px}
    input,select{width:100%;padding:8px;margin:6px 0}
    button{padding:8px 12px;background:#2a9d8f;color:#fff;border:0;border-radius:4px}
    pre{background:#f4f4f4;padding:8px}
  </style>
</head>
<body>
<header><h2 style="margin:0">Plans</h2></header>
<main>
  <section class="card">
    <label>Protocol ID <input id="protocolId"></label>
    <label>Plan Name <input id="planName"></label>
    <label>Target Start Date <input id="protocolTargetStartDate" type="date"></label>
    <button id="createFromProtocol">Create From Protocol</button>
    <div id="createResult"></div>
  </section>

  <section class="card">
    <label>Name <input id="scratchName"></label>
    <label>Target Start Date <input id="scratchTargetStartDate" type="date"></label>
    <button id="createScratch">Create Scratch Plan</button>
  </section>

  <section class="card">
    <label>Plan ID <input id="viewId"></label>
    <button id="viewBtn">View Plan</button>
    <pre id="planView"></pre>
  </section>

  <section class="card">
    <label>Plan ID <input id="summaryId"></label>
    <button id="summaryBtn">Get Summary Report</button>
    <pre id="summaryView"></pre>
  </section>

  <a href="index.html">Back</a>
</main>
<script>
  const API_BASE = 'https://resource-planning-part1-latest.onrender.com';

  function renderPlanNode(node, depth = 0) {
    const indent = '  '.repeat(depth);
    const lines = [];
    lines.push(`${indent}${node.type}: ${node.name} [${node.status}] (${node.id})`);
    if (node.implementedAction) {
      lines.push(`${indent}  implemented: start=${node.implementedAction.actualStart || ''}, party=${node.implementedAction.actualParty || ''}, location=${node.implementedAction.actualLocation || ''}`);
    }
    if (node.allocations && node.allocations.length) {
      lines.push(`${indent}  allocations:`);
      node.allocations.forEach(allocation => {
        lines.push(`${indent}    - ${allocation.resourceTypeName || allocation.resourceTypeId}: ${allocation.quantity} ${allocation.kind}${allocation.assetId ? ' asset=' + allocation.assetId : ''}`);
      });
    }
    (node.children || []).forEach(child => {
      lines.push(renderPlanNode(child, depth + 1));
    });
    return lines.join('\n');
  }

    const name = document.getElementById('planName').value.trim();
    const targetStartDate = document.getElementById('protocolTargetStartDate').value;

  document.getElementById('createScratch').onclick = async ()=>{
    const name = document.getElementById('scratchName').value.trim();
    const targetStartDate = document.getElementById('scratchTargetStartDate').value;
    if(!name||!targetStartDate){alert('name and target start date required');return}
    try{ const res = await fetch(API_BASE + '/api/plans', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name, targetStartDate})}); if(!res.ok){ const err = await res.text(); throw new Error(res.status + ': ' + err) } const json = await res.json(); alert('Created: '+json.id); }catch(e){ alert('Error: '+e.message) }
  }
  document.getElementById('viewBtn').onclick = async ()=>{
    const id = document.getElementById('viewId').value.trim(); if(!id){alert('id required');return}
    try{
      const res = await fetch(API_BASE + '/api/plans/' + encodeURIComponent(id));
      const json = await res.json();
      document.getElementById('planView').innerText = renderPlanNode(json);
    }catch(e){ document.getElementById('planView').innerText = 'Error: '+e.message }
  }
  document.getElementById('summaryBtn').onclick = async ()=>{
    const id = document.getElementById('summaryId').value.trim(); if(!id){alert('id required');return}
    try{
      const res = await fetch(API_BASE + '/api/plans/' + encodeURIComponent(id) + '/report');
      const json = await res.json();
      document.getElementById('summaryView').innerText = json.map(row => {
        const allocations = Object.entries(row.allocations || {}).map(([resource, quantity]) => `${resource}=${quantity}`).join(', ');
        return `${row.type}: ${row.name} [${row.status}] ${allocations}`;
      }).join('\n');
    }catch(e){ document.getElementById('summaryView').innerText = 'Error: '+e.message }
  }
</script>
</body>
</html>
