  document.getElementById('loadEntries').onclick = async ()=>{
    const id = document.getElementById('acctId').value.trim(); if(!id){ alert('id required'); return }
    try{ const res = await fetch(API_BASE + '/api/accounts/' + encodeURIComponent(id) + '/entries'); const data = await res.json(); document.getElementById('entriesView').innerText = JSON.stringify(data,null,2);}catch(e){ document.getElementById('entriesView').innerText = 'Error: '+e.message }
  }

  document.getElementById('depositBtn').onclick = async ()=>{
    const id = document.getElementById('depositAcctId').value.trim();
    const amount = Number(document.getElementById('depositAmount').value);
    if(!id || !amount){ alert('account id and positive amount required'); return }
    try{
      const res = await fetch(API_BASE + '/api/accounts/' + encodeURIComponent(id) + '/deposit', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({amount})});
      if(!res.ok){ const err = await res.text(); throw new Error(res.status + ': ' + err) }
      const json = await res.json();
      document.getElementById('depositResult').innerText = 'Deposited entry: ' + json.id;
      document.getElementById('refresh').click();
    }catch(e){ document.getElementById('depositResult').innerText = 'Error: ' + e.message }
  }
</script>
