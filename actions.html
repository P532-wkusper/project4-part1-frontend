<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Actions</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:0;padding:0}
    header{background:#264653;color:#fff;padding:12px}
    main{padding:16px}
    .card{border:1px solid #ddd;padding:12px;margin:8px 0;border-radius:6px}
    input,select{width:100%;padding:8px;margin:6px 0}
    button{padding:8px 12px;background:#2a9d8f;color:#fff;border:0;border-radius:4px}
    pre{background:#f4f4f4;padding:8px}
  </style>
</head>
<body>
<header><h2 style="margin:0">Actions</h2></header>
<main>
  <section class="card">
    <h3>Transition an Action</h3>
    <label>Action ID <input id="actionId"></label>
    <div style="display:flex;gap:6px">
      <button id="implement">Implement</button>
      <button id="suspend">Suspend</button>
      <button id="resume">Resume</button>
      <button id="complete">Complete</button>
      <button id="abandon">Abandon</button>
    </div>
    <div id="transitionResult"></div>
  </section>

  <section class="card">
    <h3>Add Allocation</h3>
    <label>Action ID <input id="allocActionId"></label>
    <label>ResourceType ID <input id="resType"></label>
    <label>Quantity <input id="qty" type="number" step="0.01"></label>
    <label>Kind <select id="allocKind"><option value="GENERAL">GENERAL</option><option value="SPECIFIC">SPECIFIC</option></select></label>
    <label>Asset ID (optional) <input id="assetId"></label>
    <button id="addAlloc">Add</button>
    <div id="allocResult"></div>
  </section>

  <a href="index.html">Back</a>
</main>
<script>
  const API_BASE = 'https://resource-planning-part1-latest.onrender.com';
  async function call(action){
    const id = document.getElementById('actionId').value.trim(); if(!id){ alert('action id required'); return }
    try{
      const res = await fetch(API_BASE + '/actions/' + encodeURIComponent(id) + '/' + action, {method:'POST'});
      const json = await res.json(); document.getElementById('transitionResult').innerText = JSON.stringify(json,null,2);
    }catch(e){ document.getElementById('transitionResult').innerText = 'Error: '+e.message }
  }
  document.getElementById('implement').onclick = ()=>call('implement');
  document.getElementById('suspend').onclick = ()=>call('suspend');
  document.getElementById('resume').onclick = ()=>call('resume');
  document.getElementById('complete').onclick = ()=>call('complete');
  document.getElementById('abandon').onclick = ()=>call('abandon');

  document.getElementById('addAlloc').onclick = async ()=>{
    const actionId = document.getElementById('allocActionId').value.trim();
    const resourceTypeId = document.getElementById('resType').value.trim();
    const quantity = Number(document.getElementById('qty').value);
    const kind = document.getElementById('allocKind').value;
    const assetId = document.getElementById('assetId').value.trim()||null;
    if(!actionId||!resourceTypeId||!quantity){ alert('action id, resource type and quantity required'); return }
    const body = {resourceTypeId,quantity,kind}; if(assetId) body.assetId = assetId;
    try{
      const res = await fetch(API_BASE + '/actions/' + encodeURIComponent(actionId) + '/allocations', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const json = await res.json(); document.getElementById('allocResult').innerText = JSON.stringify(json,null,2);
    }catch(e){ document.getElementById('allocResult').innerText = 'Error: '+e.message }
  }
</script>
</body>
</html>
